<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Add Member Ultimate</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#0f172a;color:#fff;display:flex;justify-content:center;padding:30px 10px;}

.container{
  width:100%;
  max-width:800px;
  background:#1e293b;
  border-radius:20px;
  padding:25px;
}

h3{margin:15px 0;color:#a5b4fc;}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:#fff;
}

textarea{height:120px;}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  margin-top:8px;
}

.start{background:#38bdf8;}
.stop{background:#ef4444;}
.restart{background:#f59e0b;}

.stats{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

.tabBar{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tabBar button{
  flex:1;
  background:#0f172a;
  color:#fff;
  border:1px solid #334155;
}

.tabBar button.active{
  background:#38bdf8;
}

.accountsTable{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

.accountsTable th,
.accountsTable td{
  padding:10px;
  border-bottom:1px solid #334155;
}

#memberList{
  margin-top:10px;
  max-height:200px;
  overflow:auto;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

/* loader */
.loader-bar{
  height:4px;
  width:100%;
  margin-top:15px;
  border-radius:10px;
  background:#0f172a;
  overflow:hidden;
  position:relative;
  display:none;
}

.loader-bar::before{
  content:"";
  position:absolute;
  height:100%;
  width:40%;
  background:linear-gradient(90deg,transparent,#38bdf8,transparent);
  animation:move 1s linear infinite;
}

@keyframes move{
  0%{left:-40%}
  100%{left:100%}
}
</style>
</head>

<body>

<div class="container">

<div class="tabBar">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('accounts')">Accounts</button>
</div>

<!-- HOME -->
<div id="homePage">

<h3>Source Group</h3>
<input id="sourceGroup">

<button class="start" onclick="exportMembers()">Export Members</button>

<div id="exportLoading" style="display:none;margin-top:10px;color:#38bdf8;">
  ⏳ Exporting members...
</div>

<h3>Target Group</h3>
<input id="targetGroup">

<h3>Users</h3>
<textarea id="users"></textarea>

<button class="start" onclick="start()">Start</button>
<button class="stop" onclick="stop()">Stop</button>
<button class="restart" onclick="restart()">Restart</button>

<div id="loaderBar" class="loader-bar"></div>

<div class="stats">
  <div>Success: <span id="success">0</span></div>
  <div>Fail: <span id="fail">0</span></div>
</div>

<div id="status"></div>

<h3>Logs</h3>
<div id="memberList"></div>

</div>

<!-- ACCOUNTS -->
<div id="accountsPage" style="display:none;">

<h3>Accounts</h3>

<table class="accountsTable">
<thead>
<tr>
<th>Select</th>
<th>Account</th>
<th>Status</th>
</tr>
</thead>

<tbody id="accountsList"></tbody>
</table>

</div>

</div>

<script>

let selectedAccounts = new Set();

/* ================= SAFE FETCH ================= */
async function safeJSON(url){
  try{
    const res = await fetch(url);
    const text = await res.text();
    return JSON.parse(text);
  }catch(e){
    console.error("JSON error:", e);
    return null;
  }
}

/* ================= LOAD ACCOUNTS ================= */
async function loadAccounts(){
  const data = await safeJSON("/account-status");
  if(!data) return;

  const tbody = document.getElementById("accountsList");
  tbody.innerHTML = "";

  data.forEach(a => {

    let color = "#38bdf8";
    if(a.status==="ACTIVE") color="#22c55e";
    if(a.status==="ERROR") color="#ef4444";
    if(a.status==="FLOOD") color="#f59e0b";

    const checked = selectedAccounts.has(a.account);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <input type="checkbox" class="acc"
        value="${a.account}" ${checked ? "checked" : ""}>
      </td>
      <td>${a.account}</td>
      <td style="color:${color};font-weight:700">${a.status}</td>
    `;

    tbody.appendChild(tr);
  });

  document.querySelectorAll(".acc").forEach(cb=>{
    cb.onchange = () => {
      if(cb.checked) selectedAccounts.add(cb.value);
      else selectedAccounts.delete(cb.value);
    };
  });
}

/* ================= GET ACCOUNTS ================= */
function getAccounts(){
  return [...selectedAccounts];
}

/* ================= EXPORT ================= */
async function exportMembers(){

  const accounts = getAccounts();
  if(!accounts.length){
    document.getElementById("status").innerText="Select account";
    return;
  }

  const group = document.getElementById("sourceGroup").value;

  document.getElementById("exportLoading").style.display="block";

  const data = await safeJSON("/export-members",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      account:accounts[0],
      group
    })
  });

  document.getElementById("exportLoading").style.display="none";

  if(data && data.success){
    document.getElementById("users").value = data.users.join("\n");
    document.getElementById("status").innerText =
      `Exported ${data.total} members`;
  } else {
    document.getElementById("status").innerText =
      "Export failed";
  }
}

/* ================= START ================= */
async function start(){

  const accounts = getAccounts();
  const users = document.getElementById("users").value
    .split("\n")
    .filter(x=>x.trim());

  const group = document.getElementById("targetGroup").value;

  if(!accounts.length){
    document.getElementById("status").innerText="Select account";
    return;
  }

  document.getElementById("loaderBar").style.display="block";
  document.getElementById("status").innerText="Running...";

  const res = await fetch("/start",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      group,
      usernames:users,
      accounts
    })
  });

  const data = await res.json();
  document.getElementById("status").innerText=data.message;
}

/* ================= STOP ================= */
async function stop(){
  document.getElementById("loaderBar").style.display="none";
  const r = await fetch("/stop",{method:"POST"});
  const d = await r.json();
  document.getElementById("status").innerText=d.message;
}

/* ================= RESTART ================= */
async function restart(){

  document.getElementById("loaderBar").style.display="none";

  document.getElementById("success").innerText="0";
  document.getElementById("fail").innerText="0";
  document.getElementById("memberList").innerHTML="";
  document.getElementById("status").innerText="Reset";

  selectedAccounts.clear();
  loadAccounts();
}

/* ================= LIVE SAFE ================= */
setInterval(async()=>{

  const stats = await safeJSON("/stats");
  if(stats){
    document.getElementById("success").innerText=stats.success;
    document.getElementById("fail").innerText=stats.fail;
  }

  const logs = await safeJSON("/member-logs");
  if(!logs) return;

  const box = document.getElementById("memberList");
  box.innerHTML="";

  logs.slice(-20).forEach(l=>{
    const div = document.createElement("div");
    div.textContent =
      `${l.status==="success"?"✅":"❌"} ${l.username}`;
    box.appendChild(div);
  });

},2000);

/* ================= PAGE ================= */
function showPage(p){
  document.getElementById("homePage").style.display=p==="home"?"block":"none";
  document.getElementById("accountsPage").style.display=p==="accounts"?"block":"none";
}

/* INIT */
showPage("home");
loadAccounts();

</script>

</body>
</html>
